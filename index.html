<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/skiff-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skiff</title>
    <style>
      :root {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #171717;
        background: transparent;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-text-size-adjust: 100%;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
        background: transparent;
        user-select: none;
        -webkit-user-select: none;
      }

      #root {
        background: transparent;
      }

      .startup-shell {
        display: grid;
        width: 100%;
        height: 100%;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 38%, rgb(20 92 83 / 10%), transparent 30%),
          #f7f8f6;
      }

      .startup-brand {
        display: grid;
        justify-items: center;
        gap: 18px;
        width: min(280px, calc(100% - 48px));
      }

      .startup-logo {
        position: relative;
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
        border: 1px solid rgb(20 92 83 / 14%);
        border-radius: 16px;
        background:
          linear-gradient(145deg, rgb(255 255 255 / 96%), rgb(239 245 242 / 92%));
        box-shadow:
          0 18px 42px rgb(15 23 42 / 10%),
          inset 0 1px 0 rgb(255 255 255 / 90%);
        color: #145c53;
      }

      .startup-logo::after {
        position: absolute;
        inset: -7px;
        content: "";
        border-radius: 999px;
        border: 2px solid rgb(20 92 83 / 10%);
        border-top-color: #145c53;
        animation: startup-spin 960ms linear infinite;
      }

      .startup-logo-image {
        width: 42px;
        height: 42px;
        background: currentColor;
        mask: url("/src/assets/skiff-logo.svg") center / contain no-repeat;
        -webkit-mask: url("/src/assets/skiff-logo.svg") center / contain no-repeat;
      }

      .startup-copy {
        display: grid;
        gap: 7px;
        justify-items: center;
        text-align: center;
      }

      .startup-name {
        color: #101419;
        font-size: 22px;
        font-weight: 760;
        line-height: 1;
      }

      .startup-status {
        color: #6b747d;
        font-size: 13px;
        line-height: 1.4;
      }

      .startup-progress {
        position: relative;
        width: 100%;
        height: 3px;
        margin-top: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: #d9e2dd;
      }

      .startup-progress::after {
        display: block;
        width: 42%;
        height: 100%;
        content: "";
        animation: startup-progress 1.15s ease-in-out infinite;
        border-radius: inherit;
        background: #145c53;
      }

      @keyframes startup-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes startup-progress {
        0% {
          transform: translateX(-120%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <main class="startup-shell" aria-label="Skiff 正在启动">
        <section class="startup-brand">
          <div class="startup-logo" aria-hidden="true">
            <span class="startup-logo-image"></span>
          </div>
          <div class="startup-copy">
            <strong class="startup-name">Skiff</strong>
            <span class="startup-status">正在启动工作区</span>
          </div>
          <div class="startup-progress" aria-hidden="true"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
